<!-- PAGE: Nhật ký hoạt động -->
<div class="page" id="page-logs">
  <div class="page-header">
    <div>
      <div class="page-title"><i class="fas fa-terminal"></i> Nhật Ký Hoạt Động</div>
      <div class="page-subtitle">Ghi lại tất cả thao tác trên hệ thống</div>
    </div>
    <div class="toolbar-actions">
      <button class="btn btn-outline btn-sm" onclick="clearLogs()">
        <i class="fas fa-trash"></i> Xóa log
      </button>
    </div>
  </div>

  <div class="log-viewer" id="logBox">
    <div class="log-line">
      <span class="log-info"><i class="fas fa-info-circle"></i> Hệ thống sẵn sàng ghi nhật ký...</span>
    </div>
  </div>
</div>
